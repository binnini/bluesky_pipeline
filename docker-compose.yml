name: bluesky   # 프로젝트 네임스페이스 (컨테이너·볼륨·네트워크 prefix)

services:

  # ─────────────────────────────────────────
  # Message Queue
  # ─────────────────────────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.13
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 512M
      - --default-log-level=warn
    ports:
      - "19092:19092"   # Kafka API (host → container)
      - "9644:9644"     # Admin API
      - "18081:18081"   # Schema Registry
      - "18082:18082"   # Pandaproxy (REST)
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.13
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if rpk topic list --brokers redpanda:9092 | grep -q "^bluesky-raw"; then
          echo "Topic bluesky-raw already exists, skipping."
        else
          rpk topic create bluesky-raw \
            --brokers redpanda:9092 \
            --partitions 1 \
            --replicas 1
          echo "Topic bluesky-raw created."
        fi
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.6.0
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ─────────────────────────────────────────
  # Application Services
  # ─────────────────────────────────────────
  ingestor:
    build: ./services/ingestor
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: bluesky-raw
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ─────────────────────────────────────────
  # Serving Storage
  # ─────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.14.2-pg16
    environment:
      POSTGRES_DB: bluesky
      POSTGRES_USER: bluesky
      POSTGRES_PASSWORD: bluesky
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./services/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluesky -d bluesky"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1536M

  # ─────────────────────────────────────────
  # Visualization
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    ports:
      - "3001:3000"   # wikiStreams가 3000 사용 중 → 3001로 분리
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      timescaledb:
        condition: service_healthy
      loki:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ─────────────────────────────────────────
  # Logging
  # ─────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.8
    ports:
      - "3101:3100"   # wikiStreams가 3100 사용 중 → 3101로 분리
    volumes:
      - ./services/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  promtail:
    image: grafana/promtail:2.9.8
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./services/promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  redpanda-data:
  timescaledb-data:
  grafana-data:
  loki-data:

networks:
  default:
    name: bluesky-net
