name: bluesky

# 클라우드(EC2 t4g.small) 전용 compose
# 로컬과의 차이:
#   - minio / minio-init 제거 → AWS S3 사용
#   - redpanda-console 제거
#   - s3_sink: S3_ENDPOINT_URL / AWS 자격증명 제거 (EC2 IAM 인스턴스 프로파일 자동 사용)
#   - Grafana 포트: 3001 (로컬과 동일)

services:

  # ─────────────────────────────────────────
  # Message Queue
  # ─────────────────────────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.13
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 256M
      - --default-log-level=warn
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.13
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if rpk topic list --brokers redpanda:9092 | grep -q "^bluesky-raw"; then
          echo "Topic bluesky-raw already exists, skipping."
        else
          rpk topic create bluesky-raw \
            --brokers redpanda:9092 \
            --partitions 1 \
            --replicas 1
          echo "Topic bluesky-raw created."
        fi
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ─────────────────────────────────────────
  # Application Services
  # ─────────────────────────────────────────
  ingestor:
    build: ./services/ingestor
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: bluesky-raw
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  processor:
    build: ./services/processor
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: bluesky-raw
      KAFKA_GROUP_ID: processor
      DATABASE_URL: postgresql://bluesky:bluesky@timescaledb:5432/bluesky
      FLUSH_INTERVAL_SEC: "60"
    depends_on:
      redpanda:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 128M

  s3_sink:
    build: ./services/s3_sink
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: bluesky-raw
      KAFKA_GROUP_ID: s3_sink
      S3_BUCKET: bluesky-raw-707042668475
      AWS_DEFAULT_REGION: ap-northeast-2
      MAX_RECORDS: "10000"
      # S3_ENDPOINT_URL 없음 → AWS S3 직접 사용
      # AWS 자격증명 없음 → EC2 IAM 인스턴스 프로파일 자동 사용
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  # ─────────────────────────────────────────
  # Serving Storage
  # ─────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.14.2-pg16
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=64MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "max_connections=20"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "maintenance_work_mem=32MB"
      - "-c"
      - "wal_buffers=4MB"
    environment:
      POSTGRES_DB: bluesky
      POSTGRES_USER: bluesky
      POSTGRES_PASSWORD: bluesky
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./services/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluesky -d bluesky"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 384M

  # ─────────────────────────────────────────
  # Visualization
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      timescaledb:
        condition: service_healthy
      loki:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 128M

  # ─────────────────────────────────────────
  # Logging
  # ─────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.8
    ports:
      - "3100:3100"
    volumes:
      - ./services/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 128M

  promtail:
    image: grafana/promtail:2.9.8
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./services/promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

volumes:
  redpanda-data:
  timescaledb-data:
  grafana-data:
  loki-data:

networks:
  default:
    name: bluesky-net
